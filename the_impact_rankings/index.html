<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>THE Impact Rankings — UFF ODS Analytics</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jstat@1.9.6/dist/jstat.min.js"></script>

  <style>
    :root {
      --primary-color: #004a8e;
      --primary-light: #0066c2;
      --bg-color: #f3f4f6;
      --card-bg: #ffffff;
      --text-main: #212529;
    }
    body { font-family: 'Roboto', sans-serif; background: var(--bg-color); color: var(--text-main); padding-bottom: 40px; }
    .app-header {
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-light) 100%);
      color: white; padding: 2rem 1rem; margin-bottom: 2rem;
      box-shadow: 0 4px 10px rgba(0,74,142,0.2);
    }
    .app-header h1 { font-weight: 700; margin: 0; }
    .app-header .subtitle { opacity: 0.9; font-weight: 300; font-size: 1.1rem; margin-top: 5px; }
    .controls-card {
      background: var(--card-bg); border-radius: 12px; padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05); margin-bottom: 24px;
      border-left: 5px solid var(--primary-color);
    }
    .form-label { font-weight: 500; color: var(--primary-color); font-size: 0.9rem; margin-bottom: 4px; }
    .form-select, .btn { border-radius: 8px; }
    .btn-primary { background-color: var(--primary-color); border-color: var(--primary-color); }
    .btn-primary:hover { background-color: var(--primary-light); }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    @media(max-width: 1200px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media(max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    .chart-card {
      background: var(--card-bg); border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 4px 6px rgba(0,0,0,0.03);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .chart-header { padding: 15px 20px; border-bottom: 1px solid #f0f0f0; background: #fafafa; }
    .chart-title { font-weight: 700; color: var(--primary-color); font-size: 1rem; margin: 0; }
    .chart-subtitle { font-size: 0.75rem; color: #888; margin-top: 2px; }
    .chart-body { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; }
    .stats-footer { background: #fdfdfd; border-top: 1px solid #eee; padding: 10px 15px; font-size: 0.8rem; color: #555; }
    .stat-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-weight: 600; font-size: 0.7rem; margin-left: 5px; }
    .badge-sig { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .badge-not-sig { background-color: #f5f5f5; color: #616161; border: 1px solid #e0e0e0; }
    .trend-up { color: #2e7d32; font-weight: bold; }
    .trend-down { color: #c62828; font-weight: bold; }
    .no-data { display: flex; align-items: center; justify-content: center; height: 200px; color: #aaa; font-style: italic; }
    footer { margin-top: 40px; text-align: center; font-size: 13px; color: #999; }
    .ods-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; background: #e3f0fb; color: var(--primary-color); margin-left: 6px; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="container-fluid px-4">
    <h1><i class="bi bi-bar-chart-line-fill me-2"></i>THE Impact Rankings — UFF ODS Analytics</h1>
    <div class="subtitle">Comparador de Métricas por ODS (2019–2025)</div>
  </div>
</header>

<div class="container-fluid px-4">
  <div class="controls-card">
    <div class="row g-3 align-items-end">
      <div class="col-md-3">
        <label class="form-label"><i class="bi bi-building"></i> Comparar UFF com:</label>
        <select id="compareSelect" class="form-select">
          <option value="">Selecione uma universidade...</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label"><i class="bi bi-award"></i> ODS:</label>
        <select id="odsSelect" class="form-select">
          <option value="all">Todos os ODS</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label"><i class="bi bi-calendar-range"></i> Período:</label>
        <div class="input-group">
          <select id="minYear" class="form-select"></select>
          <span class="input-group-text bg-light text-muted">até</span>
          <select id="maxYear" class="form-select"></select>
        </div>
      </div>
      <div class="col-md-2">
        <label class="form-label"><i class="bi bi-graph-up"></i> Visualização:</label>
        <div class="btn-group w-100" role="group">
          <input type="radio" class="btn-check" name="chartType" id="typeLine" value="line" checked>
          <label class="btn btn-outline-primary" for="typeLine"><i class="bi bi-bezier2"></i> Tendência</label>
          <input type="radio" class="btn-check" name="chartType" id="typeBox" value="box">
          <label class="btn btn-outline-primary" for="typeBox"><i class="bi bi-box-seam"></i> Boxplot</label>
        </div>
      </div>
      <div class="col-md-2">
        <label class="form-label"><i class="bi bi-chat-left-text"></i> Rótulos:</label>
        <div class="d-flex gap-2 mt-2 flex-wrap">
          <div class="form-check">
            <input class="form-check-input" type="radio" name="annMode" id="annUff" value="uff" checked>
            <label class="form-check-label" for="annUff">UFF</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="annMode" id="annBoth" value="both">
            <label class="form-check-label" for="annBoth">Ambos</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="annMode" id="annNone" value="none">
            <label class="form-check-label" for="annNone">Off</label>
          </div>
        </div>
      </div>
    </div>
    <div class="row mt-3">
      <div class="col-12 d-flex justify-content-between align-items-center">
        <div id="status" class="text-primary fw-bold small"><i class="bi bi-check-circle-fill text-success"></i> Dados prontos</div>
        <div>
          <button id="refreshBtn" class="btn btn-sm btn-outline-secondary me-2"><i class="bi bi-arrow-clockwise"></i> Reset</button>
          <button id="applyFilter" class="btn btn-primary px-4"><i class="bi bi-check2-circle"></i> Atualizar Dashboard</button>
        </div>
      </div>
    </div>
  </div>

  <div id="charts" class="grid"></div>

  <footer>
    <strong>Fonte:</strong> Times Higher Education (THE) Impact Rankings. Desenvolvido por PGI/PLAN (UFF).
  </footer>
</div>

  const INSTITUTIONS = DATASET.institutions;

  // Transform compact rows -> objects (keeps original `rows` variable name from index.html)
  // Row schema: [iIdx, ods, year, score, rank, rankRaw, scoreRaw]
  const rows = DATASET.rows.map(r => ({

    indicator: "Score Geral (THE)",       // single indicator per ODS in the new data

  // Comparison universities: those with overlap with UFF, sorted alphabetically.
  const uffKeys = new Set(rows.filter(r => r.uni === UFF).map(r => r.odsNum + "-" + r.year));
  const candidates = {};
  rows.forEach(r => {

  Object.keys(candidates).sort((a,b) => a.localeCompare(b)).forEach(name => {

  // ─── STATS UTILITIES ────────────────────────────────────────────────────────
  function mean(xs) { return xs.reduce((a,b) => a+b, 0) / xs.length; }
  function variance(xs, mu) {
    if (xs.length < 2) return null;
    return xs.reduce((s,x) => s + (x-mu)*(x-mu), 0) / (xs.length - 1);
  }

  // Mann-Kendall non-parametric trend test
  function mannKendall(xs) {
    if (xs.length < 4) return { p: null, trend: "", text: "amostra pequena" };
    let S = 0;
    const n = xs.length;
    for (let i = 0; i < n-1; i++)
      for (let j = i+1; j < n; j++)
        S += Math.sign(xs[j] - xs[i]);
    const varS = n*(n-1)*(2*n+5)/18;
    if (varS === 0) return { p: 1, trend: "", text: "sem variação" };
    const z = (S > 0 ? S-1 : S < 0 ? S+1 : 0) / Math.sqrt(varS);
    const p = 2*(1 - jStat.normal.cdf(Math.abs(z), 0, 1));
    const sig = p < 0.05;
    if (S > 0)      return { p, trend: "trend-up",   text: sig ? "↑ alta significativa" : "↑ alta" };
    else if (S < 0) return { p, trend: "trend-down", text: sig ? "↓ queda significativa" : "↓ queda" };
    else            return { p, trend: "", text: "estável" };
  }

  // Hypothesis test: PAIRED t-test when there are >=3 matched-by-year pairs;
  // fallback to Welch (independent samples) otherwise.
  function hypothesisTest(pairs, uffVals, cmpVals) {
    // pairs: array of [uffVal, cmpVal] from same year
    if (pairs.length >= 3) {
      const diffs = pairs.map(p => p[0] - p[1]);
      const md = mean(diffs);
      const vd = variance(diffs, md);
      if (vd === null || vd === 0) return null;
      const n = diffs.length;
      const t = md / Math.sqrt(vd/n);
      const df = n - 1;
      const p = 2*(1 - jStat.studentt.cdf(Math.abs(t), df));
      return {
        pValT: p,
        significant: p < 0.05,
        testName: "t pareado",
        n: n,
        meanDiff: md
      };
    }
    // Fallback: Welch (independent)
    if (uffVals.length < 3 || cmpVals.length < 3) return null;
    const m1 = mean(uffVals), m2 = mean(cmpVals);
    const v1 = variance(uffVals, m1), v2 = variance(cmpVals, m2);
    if (v1 === null || v2 === null) return null;
    const n1 = uffVals.length, n2 = cmpVals.length;
    const tStat = (m1 - m2) / Math.sqrt(v1/n1 + v2/n2);
    const df = Math.pow(v1/n1 + v2/n2, 2) /
               ((Math.pow(v1/n1, 2)/(n1-1)) + (Math.pow(v2/n2, 2)/(n2-1)));
    const p = 2*(1 - jStat.studentt.cdf(Math.abs(tStat), df));
    return {
      pValT: p,
      significant: p < 0.05,
      testName: "Welch (n. pareado)",
      n: n1 + n2,
      meanDiff: m1 - m2
    };
  }

  // ─── SHORT NAME ─────────────────────────────────────────────────────────────
  function shortName(n) {
    return n
      .replace(/Universidade Federal de /i, "UF ")
      .replace(/Universidade Federal do /i, "UF ")
      .replace(/Universidade Federal /i, "UF ")
      .replace(/Federal University of /i, "UF ")
      .replace(/State University of /i, "UE ")
      .replace(/University of /i, "U. ")
      .replace(/Fluminense Federal University/i, "UFF");
  }

  function render(compareTo) {

    const endY   = parseInt(maxYear.value);

    if (startY > endY) {
      chartsDiv.innerHTML = '<div class="col-12 text-center text-muted py-5">Período inválido.</div>';
      return;
    }

    const yrRange = [];
    for (let y = startY; y <= endY; y++) yrRange.push(y);

    const selectedOds = odsSelect.value;

    // Build list of ODS to render (those where UFF has data in range)
    const odsToRender = new Set();
    rows.forEach(r => {
      if (r.uni !== UFF) return;
      if (selectedOds !== "all" && r.ods !== selectedOds) return;
      if (r.year < startY || r.year > endY) return;
      odsToRender.add(r.ods);
    });

    if (odsToRender.size === 0) {
      chartsDiv.innerHTML = '<div class="col-12 text-center text-muted py-5">Nenhum dado disponível para esta seleção.</div>';

      });

      const uffVals = uffPts.filter(d => d.y !== null).map(d => d.y);
      const cmpVals = cmpPts.filter(d => d.y !== null).map(d => d.y);

      // Latest rank for subtitle
      const uffLast = uffPts.slice().reverse().find(d => d.rank !== null);
      const rankLabel = uffLast ? uffLast.rank : "";

      const card = document.createElement("div");
      card.className = "chart-card";
      card.innerHTML = `
        <div class="chart-header">
          <div class="d-flex align-items-center justify-content-between">
            <h3 class="chart-title">${ods}</h3>
            <span class="ods-badge">Score</span>
          </div>
          ${rankLabel ? `<div class="chart-subtitle">UFF último rank: ${rankLabel}</div>` : `<div class="chart-subtitle">&nbsp;</div>`}
        </div>`;

      const body = document.createElement("div");
      body.className = "chart-body";
      const plotDiv = document.createElement("div");
      plotDiv.style.height = "260px";
      body.appendChild(plotDiv);
      card.appendChild(body);
      chartsDiv.appendChild(card);

      const layout = {
        margin: { t: 20, l: 50, r: 20, b: 35 },
        showlegend: true,
        legend: { orientation: "h", x: 0, y: 1.18, font: { size: 11 } },
        yaxis: { gridcolor: "#eee", zeroline: false },
        xaxis: { dtick: 1, gridcolor: "#eee", tickformat: "d" },
        plot_bgcolor: "white",
        paper_bgcolor: "white",
        font: { family: "Roboto, sans-serif", size: 11 }
      };

      if (chartType === "line") {
        const traces = [{
          x: uffPts.map(d => d.x), y: uffPts.map(d => d.y),
          mode: "lines+markers", name: "UFF",
          line: { color: "#004a8e", width: 2.5 },
          marker: { size: 6 },
          connectgaps: false,
          text: uffPts.map(d => d.raw ? "valor: " + d.raw + "<br>rank: " + (d.rank || "—") : ""),
          hovertemplate: "<b>UFF</b> · %{x}<br>score: %{y}<br>%{text}<extra></extra>"
        }];
        if (hasCmp && cmpVals.length > 0) {
          traces.push({
            x: cmpPts.map(d => d.x), y: cmpPts.map(d => d.y),
            mode: "lines+markers",
            name: shortName(compareTo),
            line: { color: "#e65100", width: 2, dash: "dot" },
            marker: { size: 6, symbol: "diamond" },
            connectgaps: false,
            text: cmpPts.map(d => d.raw ? "valor: " + d.raw + "<br>rank: " + (d.rank || "—") : ""),
            hovertemplate: "<b>" + shortName(compareTo) + "</b> · %{x}<br>score: %{y}<br>%{text}<extra></extra>"
          });
        }

        const anns = [];
        const addAnn = (pts, col) => pts.forEach(d => {
          if (d.y !== null && (annotationMode === "both" || (annotationMode === "uff" && col === "#004a8e"))) {
            anns.push({ x: d.x, y: d.y, text: String(d.y), showarrow: false, yshift: 12, font: { color: col, size: 9, weight: "bold" } });
          }
        });
        addAnn(uffPts, "#004a8e");
        if (hasCmp) addAnn(cmpPts, "#e65100");
        layout.annotations = anns;

        Plotly.newPlot(plotDiv, traces, layout, { responsive: true, displaylogo: false, modeBarButtonsToRemove: ['select2d','lasso2d'] });

        const mk = mannKendall(uffVals);
        const footer = document.createElement("div");
        footer.className = "stats-footer";
        footer.innerHTML = `Tendência UFF: <span class="${mk.trend}">${mk.text}</span>${mk.p !== null ? ` (p=${mk.p.toFixed(3)})` : ""}`;
        card.appendChild(footer);

      } else {
        // boxplot
        const traces = [{ y: uffVals, type: "box", name: "UFF", marker: { color: "#004a8e" }, boxmean: true }];
        if (hasCmp && cmpVals.length > 0) {
          traces.push({ y: cmpVals, type: "box",
            name: shortName(compareTo),
            marker: { color: "#e65100" }, boxmean: true });
        }
        Plotly.newPlot(plotDiv, traces, layout, { responsive: true, displaylogo: false });

        if (hasCmp) {
          // Build year-matched pairs
          const pairs = [];
          uffPts.forEach((u, i) => {
            const c = cmpPts[i];
            if (u.y !== null && c.y !== null) pairs.push([u.y, c.y]);
          });
          const stats = hypothesisTest(pairs, uffVals, cmpVals);
          if (stats) {
            const footer = document.createElement("div");
            footer.className = "stats-footer";
            const badge = stats.significant
              ? `<span class="stat-badge badge-sig">Dif. Sig. (p&lt;0.05)</span>`
              : `<span class="stat-badge badge-not-sig">Não Significativo</span>`;
            const diffSign = stats.meanDiff >= 0 ? "+" : "";
            footer.innerHTML = `<strong>${stats.testName}</strong> | p: ${stats.pValT.toFixed(4)} | Δ̄: ${diffSign}${stats.meanDiff.toFixed(2)} ${badge}`;
            card.appendChild(footer);
          }
        }
      }
    });

    // Update status
    const cmpInfo = hasCmp ? ` · vs. ${shortName(compareTo)}` : "";
    statusDiv.innerHTML = `<i class="bi bi-check-circle-fill text-success"></i> ${sortedOds.length} ODS exibido(s)${cmpInfo}`;
  }

  // ─── EVENT LISTENERS ────────────────────────────────────────────────────────
  compareSelect.onchange = e => render(e.target.value);
  odsSelect.onchange = () => render(compareSelect.value);
  minYear.onchange = () => render(compareSelect.value);
  maxYear.onchange = () => render(compareSelect.value);
  document.getElementById("applyFilter").onclick = () => render(compareSelect.value);
  document.getElementById("refreshBtn").onclick = () => location.reload();
  document.querySelectorAll("input[name='annMode']").forEach(r => r.onchange = e => { annotationMode = e.target.value; render(compareSelect.value); });
  document.querySelectorAll("input[name='chartType']").forEach(r => r.onchange = e => { chartType = e.target.value; render(compareSelect.value); });

  render();
})();
</script>
</body>
</html>
